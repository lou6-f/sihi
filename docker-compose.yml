version: "3.9"

services:
  # ─────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────
  # STT Service (PhoWhisper)
  # ─────────────────────────────────────
  stt:
    build: ./stt-service
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────
  # CV Module (FastAPI + MinerU + Tinix KG)
  # ─────────────────────────────────────
  cv-module:
    build:
      context: ./cv-module
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    env_file: ./cv-module/.env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 6G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 360s  # MinerU khởi động chậm, chờ 6 phút

  # ─────────────────────────────────────
  # WebSocket Server
  # ─────────────────────────────────────
  ws:
    build: ./ws-server
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - PHOWHISPER_URL=http://stt:8001
      - REDIS_URL=redis://redis:6379
    depends_on:
      stt:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
