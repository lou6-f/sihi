version: "3.9"

services:
  stt:
    build: ./stt-service
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ws:
    build: ./ws-server
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - PHOWHISPER_URL=http://stt:8001
    depends_on:
      stt:
        condition: service_healthy
    restart: unless-stopped
