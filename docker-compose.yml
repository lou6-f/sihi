version: "3.9"

services:
  # ─────────────────────────────────────
  # Redis — job tracking / cache
  # ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────
  # STT Service (PhoWhisper)
  # ─────────────────────────────────────
  stt:
    build: ./be/stt-service
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────
  # CV Module (FastAPI + MinerU + Tinix KG)
  # DB: Supabase PostgreSQL (chung với SiHi)
  # ─────────────────────────────────────
  cv-module:
    build:
      context: ./be/cv-module
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    env_file: ./be/cv-module/.env
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 6G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 360s

  # ─────────────────────────────────────
  # WebSocket Server
  # ─────────────────────────────────────
  ws:
    build: ./be/ws-server
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - PHOWHISPER_URL=http://stt:8001
      - REDIS_URL=redis://redis:6379
    depends_on:
      stt:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
