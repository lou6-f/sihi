services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cv-module-backend
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json, urllib.request; data = json.loads(urllib.request.urlopen('http://127.0.0.1:8000/ready').read()); raise SystemExit(0 if data.get('ready') else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 10m

  redis:
    image: redis:8.6.2-alpine
    container_name: cv-module-redis
    ports:
      - "6379:6379"
